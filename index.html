<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تتبع تحضير وصفات الصيدلية</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <main class="app-shell employee-shell">
    <header class="official-top">
      <div class="official-header">
        <h2>تجمع المدينة المنورة الصحي</h2>
        <h3>مستشفى الملك فهد بالمدينة المنورة</h3>
        <h3>إدارة الرعاية الصيدلانية</h3>
      </div>
      <img class="official-logo" src="logo.png" alt="Logo">
    </header>

    <hr class="official-divider">

    <div class="employee-meta">
      <div class="date-box" id="dateBox"></div>
    </div>

    <h1 class="employee-page-title">تحضير وصفات البريد</h1>

    <section id="loginView" class="view auth-view">
      <form id="loginForm" class="panel employee-login-card">
        <label for="username">اسم المستخدم</label>
        <input id="username" name="username" autocomplete="username" required>

        <label for="pin">PIN</label>
        <input id="pin" name="pin" type="password" inputmode="numeric" autocomplete="current-password" required>

        <button class="primary-btn" type="submit">دخول</button>
        <p id="loginMessage" class="message" role="status"></p>
      </form>
    </section>

    <section id="prepView" class="view prep-view hidden">
      <header class="topbar employee-toolbar">
        <div>
          <span class="muted">المحضّر</span>
          <strong id="currentUser"></strong>
        </div>
        <button id="logoutBtn" class="ghost-btn" type="button">خروج</button>
      </header>

      <section class="scanner-area">
        <div id="reader"></div>
        <div class="scan-actions">
          <button id="startCameraBtn" class="camera-toggle" type="button" aria-pressed="false">
            <span class="camera-status-dot" aria-hidden="true"></span>
            <span id="cameraButtonText">تشغيل الكاميرا</span>
          </button>
          <button id="manualBtn" class="ghost-btn" type="button">إدخال يدوي</button>
        </div>
        <form id="manualForm" class="manual-form hidden">
          <input id="manualFileNumber" inputmode="numeric" placeholder="رقم الملف">
          <button type="submit">بحث</button>
        </form>
        <p id="scanMessage" class="message" role="status"></p>
      </section>

      <section id="resultCard" class="result-card hidden" aria-live="polite">
        <div>
          <span class="label">رقم الملف</span>
          <strong id="fileNumberText"></strong>
        </div>
        <div>
          <span class="label">اسم المريض</span>
          <strong id="patientNameText"></strong>
        </div>
        <p id="preparedMessage" class="prepared-message hidden"></p>
        <button id="markPreparedBtn" class="done-btn" type="button">تم التحضير</button>
      </section>
    </section>
  </main>
</body>
</html>
